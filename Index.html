<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Thinking Vocab</title>

  <!-- PWA Meta -->
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="TF&S Vocab"/>
  <meta name="theme-color" content="#1e1b4b"/>
  <meta name="mobile-web-app-capable" content="yes"/>

  <!-- PWA Manifest (inline) -->
  <link rel="manifest" href="data:application/json,{
    %22name%22:%22Thinking%2C%20Fast%20and%20Slow%20Vocab%22,
    %22short_name%22:%22TF%26S%20Vocab%22,
    %22start_url%22:%22.%22,
    %22display%22:%22standalone%22,
    %22background_color%22:%22%231e1b4b%22,
    %22theme_color%22:%22%231e1b4b%22,
    %22icons%22:[{%22src%22:%22data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%231e1b4b'/%3E%3Ctext y='.9em' font-size='72' x='12'%3E🧠%3C/text%3E%3C/svg%3E%22,%22sizes%22:%22any%22,%22type%22:%22image/svg+xml%22}]
  }"/>

  <!-- Apple Touch Icon (inline SVG as data URI) -->
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%231e1b4b'/><text y='.9em' font-size='72' x='12'>🧠</text></svg>"/>

  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f0f7;min-height:100vh;min-height:100dvh}
    button{font-family:inherit;cursor:pointer}
    input{font-family:inherit}

    /* Card flip */
    .flip-container{perspective:1200px;width:100%;max-width:560px;margin:0 auto}
    .flip-card{position:relative;width:100%;min-height:340px;transform-style:preserve-3d;transition:transform .55s cubic-bezier(.4,0,.2,1)}
    .flip-card.flipped{transform:rotateY(180deg)}
    .flip-front,.flip-back{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:20px;padding:28px}
    .flip-front{background:linear-gradient(145deg,#1e1b4b,#312e81);display:flex;flex-direction:column;justify-content:space-between;box-shadow:0 20px 60px rgba(49,46,129,.4)}
    .flip-back{transform:rotateY(180deg);background:#fafaf9;display:flex;flex-direction:column;gap:14px;box-shadow:0 20px 60px rgba(0,0,0,.12)}

    /* Scrollbar */
    ::-webkit-scrollbar{height:4px;width:4px}
    ::-webkit-scrollbar-thumb{background:#d4d4d8;border-radius:4px}

    /* Safe areas */
    .header{padding-top:max(28px, env(safe-area-inset-top, 28px))}
    .body-pad{padding:24px 16px max(60px, calc(env(safe-area-inset-bottom,0px) + 24px))}

    /* Progress bar fill animation */
    .prog-fill{transition:width .4s ease}

    /* Quiz option hover */
    .quiz-opt:not(:disabled):hover{opacity:.85}

    /* Tag scroll */
    .tag-scroll{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
    .tag-scroll::-webkit-scrollbar{display:none}
  </style>
</head>
<body>

<div id="app"></div>

<script>
// ─── DATA ────────────────────────────────────────────────────────────────────
const VOCAB = [
  {id:1,word:"heuristic",part:"n.",phonetic:"/hjʊˈrɪstɪk/",
   definition:"A mental shortcut or rule of thumb that simplifies decision-making",
   korean:"어림법, 발견적 방법",
   bookContext:'"We often rely on heuristics — mental shortcuts — that serve us well most of the time, but lead us astray in others."',
   chapter:"Ch. 11 · Anchoring",tags:["System 1","Core Concept"],difficulty:"hard"},
  {id:2,word:"cognitive ease",part:"n. phrase",phonetic:"/ˈkɒɡnɪtɪv iːz/",
   definition:"The sense of fluency and comfort when thinking feels effortless",
   korean:"인지적 편안함",
   bookContext:'"Cognitive ease... is both a cause and a consequence of a pleasant feeling."',
   chapter:"Ch. 5 · Cognitive Ease",tags:["System 1","Core Concept"],difficulty:"medium"},
  {id:3,word:"priming",part:"n.",phonetic:"/ˈpraɪmɪŋ/",
   definition:"The effect of an earlier stimulus on how you interpret or respond to a later one",
   korean:"점화 효과",
   bookContext:'"The idea of priming suggests that reminding people of their mortality affects their behavior."',
   chapter:"Ch. 4 · The Associative Machine",tags:["System 1","Bias"],difficulty:"medium"},
  {id:4,word:"anchoring effect",part:"n. phrase",phonetic:"/ˈæŋkərɪŋ ɪˌfekt/",
   definition:"The tendency to rely too heavily on the first piece of information encountered",
   korean:"닻 내리기 효과",
   bookContext:'"Any number you consider as a possible answer will induce an anchoring effect."',
   chapter:"Ch. 11 · Anchoring",tags:["Bias","Judgment"],difficulty:"easy"},
  {id:5,word:"availability heuristic",part:"n. phrase",phonetic:"/əˌveɪləˈbɪlɪti hjʊˈrɪstɪk/",
   definition:"Judging frequency or probability by how easily examples come to mind",
   korean:"가용성 어림법",
   bookContext:"\"The availability heuristic... substitutes one question for another: 'How many instances come to mind?' for 'How likely is it?'\"",
   chapter:"Ch. 12 · Availability",tags:["Heuristic","Bias"],difficulty:"hard"},
  {id:6,word:"overconfidence",part:"n.",phonetic:"/ˌoʊvərˈkɒnfɪdəns/",
   definition:"Excessive faith in one's own answers, judgments, or predictions",
   korean:"과잉확신, 자만",
   bookContext:'"Overconfidence is fed by the illusory certainty of hindsight."',
   chapter:"Ch. 24 · The Engine of Capitalism",tags:["Bias","Judgment"],difficulty:"easy"},
  {id:7,word:"loss aversion",part:"n. phrase",phonetic:"/lɒs əˈvɜːrʒən/",
   definition:"The tendency to feel losses more intensely than equivalent gains",
   korean:"손실 회피 성향",
   bookContext:'"The response to losses is stronger than the response to corresponding gains — this is loss aversion."',
   chapter:"Ch. 26 · Prospect Theory",tags:["Core Concept","Prospect Theory"],difficulty:"easy"},
  {id:8,word:"endowment effect",part:"n. phrase",phonetic:"/ɪnˈdaʊmənt ɪˌfekt/",
   definition:"Valuing something more simply because you own it",
   korean:"보유 효과",
   bookContext:'"The endowment effect: people demand much more to give up an object than they would be willing to pay to acquire it."',
   chapter:"Ch. 27 · The Endowment Effect",tags:["Bias","Prospect Theory"],difficulty:"medium"},
  {id:9,word:"regression to the mean",part:"n. phrase",phonetic:"/rɪˈɡreʃən tə ðə miːn/",
   definition:"Extreme measurements tend to be followed by more average ones",
   korean:"평균으로의 회귀",
   bookContext:'"Regression to the mean... is always at work, yet we are often blind to it."',
   chapter:"Ch. 17 · Regression to the Mean",tags:["Statistics","Fallacy"],difficulty:"medium"},
  {id:10,word:"narrative fallacy",part:"n. phrase",phonetic:"/ˈnærətɪv ˈfæləsi/",
   definition:"The urge to create coherent causal stories from past events, even when random",
   korean:"서사 오류",
   bookContext:'"The narrative fallacy addresses our limited ability to look at sequences of facts without weaving an explanation into them."',
   chapter:"Ch. 19 · The Illusion of Understanding",tags:["Fallacy","System 1"],difficulty:"hard"},
  {id:11,word:"substitution",part:"n.",phonetic:"/ˌsʌbstɪˈtjuːʃən/",
   definition:"Replacing a hard question with a simpler related one without noticing",
   korean:"대체 (질문 대체 현상)",
   bookContext:'"System 1 often answers an easier question than the one that was asked, and rarely notices the substitution."',
   chapter:"Ch. 9 · Answering an Easier Question",tags:["System 1","Core Concept"],difficulty:"medium"},
  {id:12,word:"denominator neglect",part:"n. phrase",phonetic:"/dɪˈnɒmɪneɪtər nɪˈɡlekt/",
   definition:"Focusing on the number of cases rather than their proportion",
   korean:"분모 무시",
   bookContext:'"Denominator neglect helps explain why low-probability risks are so often over-weighted."',
   chapter:"Ch. 29 · The Fourfold Pattern",tags:["Bias","Statistics"],difficulty:"hard"},
  {id:13,word:"framing effect",part:"n. phrase",phonetic:"/ˈfreɪmɪŋ ɪˌfekt/",
   definition:"Different presentations of the same information lead to different decisions",
   korean:"틀 짜기 효과 (프레이밍 효과)",
   bookContext:'"The framing effect shows that our preferences are not stable across descriptions of the same reality."',
   chapter:"Ch. 34 · Frames and Reality",tags:["Bias","Core Concept"],difficulty:"easy"},
  {id:14,word:"conjunction fallacy",part:"n. phrase",phonetic:"/kənˈdʒʌŋkʃən ˈfæləsi/",
   definition:"Believing that two events together are more probable than one alone",
   korean:"결합 오류",
   bookContext:"\"The Linda problem demonstrates the conjunction fallacy: 'feminist bank teller' rated more probable than 'bank teller.'\"",
   chapter:"Ch. 15 · Linda",tags:["Fallacy","Judgment"],difficulty:"medium"},
  {id:15,word:"affect heuristic",part:"n. phrase",phonetic:"/əˈfekt hjʊˈrɪstɪk/",
   definition:"Using your current emotional state as the basis for judgments and decisions",
   korean:"감정 어림법",
   bookContext:'"In the affect heuristic, people let their likes and dislikes determine their beliefs about the world."',
   chapter:"Ch. 13 · Availability, Emotion, and Risk",tags:["Heuristic","Emotion"],difficulty:"hard"},
  {id:16,word:"WYSIATI",part:"acronym",phonetic:"/ˈwɪziːæti/",
   definition:"What You See Is All There Is — System 1 builds its best story from available info, ignoring what it doesn't know",
   korean:"보이는 것이 전부다",
   bookContext:'"WYSIATI explains why we can think fast... System 1 bets on the most coherent story, not the most probable."',
   chapter:"Ch. 7 · A Machine for Jumping to Conclusions",tags:["System 1","Core Concept"],difficulty:"medium"},
  {id:17,word:"hindsight bias",part:"n. phrase",phonetic:"/ˈhaɪndˌsaɪt ˈbaɪəs/",
   definition:"The tendency to see past events as having been predictable",
   korean:"사후확신 편향",
   bookContext:'"Hindsight bias makes surprises vanish... we cannot reconstruct what we knew before."',
   chapter:"Ch. 19 · The Illusion of Understanding",tags:["Bias","Fallacy"],difficulty:"easy"},
  {id:18,word:"sunk cost fallacy",part:"n. phrase",phonetic:"/sʌŋk kɒst ˈfæləsi/",
   definition:"Continuing an endeavor because of past investment, not future value",
   korean:"매몰 비용 오류",
   bookContext:'"The sunk-cost fallacy keeps people for too long in poor jobs, unhappy marriages, and unpromising research projects."',
   chapter:"Ch. 32 · Keeping Score",tags:["Fallacy","Prospect Theory"],difficulty:"easy"},
  {id:19,word:"planning fallacy",part:"n. phrase",phonetic:"/ˈplænɪŋ ˈfæləsi/",
   definition:"Underestimating costs and time, overestimating benefits of future plans",
   korean:"계획 오류",
   bookContext:'"The planning fallacy... describes plans and forecasts that are unrealistically close to best-case scenarios."',
   chapter:"Ch. 23 · The Outside View",tags:["Fallacy","Bias"],difficulty:"medium"},
  {id:20,word:"peak-end rule",part:"n. phrase",phonetic:"/piːk ɛnd ruːl/",
   definition:"We judge experiences by their peak moment and how they ended, not their average",
   korean:"절정·끝 법칙",
   bookContext:'"The peak-end rule: the global retrospective rating was determined by the average of the peak intensity and the intensity at the end."',
   chapter:"Ch. 35 · Two Selves",tags:["Core Concept","Experience"],difficulty:"medium"},
];

const ALL_TAGS = ["All","Core Concept","System 1","Bias","Fallacy","Heuristic","Prospect Theory","Statistics","Judgment","Emotion","Experience"];
const DIFF = {easy:{bg:"#d1fae5",text:"#065f46",label:"Easy"},medium:{bg:"#fef3c7",text:"#92400e",label:"Medium"},hard:{bg:"#fee2e2",text:"#991b1b",label:"Hard"}};

// ─── STATE ───────────────────────────────────────────────────────────────────
let state = {
  tab: "flashcard",
  filterTag: "All",
  searchQ: "",
  filterMode: "all",
  cardIdx: 0,
  learnedIds: new Set(JSON.parse(localStorage.getItem("learned")||"[]")),
  wrongIds:   new Set(JSON.parse(localStorage.getItem("wrong")||"[]")),
  expandedId: null,
  quiz: null,    // {pool, idx, selected, score, done, options}
};

function save(){
  localStorage.setItem("learned", JSON.stringify([...state.learnedIds]));
  localStorage.setItem("wrong",   JSON.stringify([...state.wrongIds]));
}

function filtered(){
  return VOCAB.filter(w => {
    const matchTag  = state.filterTag==="All" || w.tags.includes(state.filterTag);
    const matchQ    = w.word.toLowerCase().includes(state.searchQ.toLowerCase()) || w.korean.includes(state.searchQ);
    const matchMode = state.filterMode==="all" ? true
      : state.filterMode==="unseen" ? !state.learnedIds.has(w.id)
      : state.wrongIds.has(w.id);
    return matchTag && matchQ && matchMode;
  });
}

function shuffle(arr){ return [...arr].sort(()=>Math.random()-.5); }

function makeOptions(current){
  const others = shuffle(VOCAB.filter(x=>x.id!==current.id)).slice(0,3);
  return shuffle([...others, current]);
}

function initQuiz(){
  const pool = shuffle(VOCAB);
  state.quiz = {
    pool, idx:0, selected:null,
    score:{correct:0,wrong:0}, done:false,
    options: makeOptions(pool[0]),
  };
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function render(){
  const app = document.getElementById("app");
  app.innerHTML = buildHTML();
  attachEvents();
}

function buildHTML(){
  const list = filtered();
  const pct  = Math.round((state.learnedIds.size/VOCAB.length)*100);
  const TABS = [
    {id:"flashcard",emoji:"🃏",label:"Flashcard"},
    {id:"list",     emoji:"📋",label:"Word List"},
    {id:"quiz",     emoji:"🧠",label:"Quiz"},
    {id:"stats",    emoji:"📊",label:"Progress"},
  ];

  return `
  <div style="min-height:100vh;min-height:100dvh;background:#f0f0f7">

    <!-- HEADER -->
    <div class="header" style="background:linear-gradient(135deg,#1e1b4b 0%,#312e81 60%,#4c1d95 100%);padding-left:20px;padding-right:20px;padding-bottom:0">
      <div style="max-width:640px;margin:0 auto">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#a5b4fc" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
          <span style="color:#a5b4fc;font-size:11px;font-weight:700;letter-spacing:.08em">THINKING, FAST AND SLOW</span>
        </div>
        <div style="color:#fff;font-size:21px;font-weight:800;margin-bottom:3px">Vocabulary Trainer</div>
        <div style="color:#c7d2fe;font-size:12px;margin-bottom:12px">${state.learnedIds.size}/${VOCAB.length} mastered · ${pct}%</div>
        <div style="width:100%;height:5px;background:rgba(255,255,255,.15);border-radius:4px;margin-bottom:16px">
          <div class="prog-fill" style="height:100%;width:${pct}%;background:#818cf8;border-radius:4px"></div>
        </div>
        <div style="display:flex;gap:3px">
          ${TABS.map(t=>`
          <button data-tab="${t.id}" style="flex:1;padding:10px 2px;border:none;border-radius:10px 10px 0 0;
            background:${state.tab===t.id?"#fff":"transparent"};
            color:${state.tab===t.id?"#1e1b4b":"#a5b4fc"};
            font-weight:700;font-size:11px;transition:all .2s">
            <div>${t.emoji}</div><div style="margin-top:2px">${t.label}</div>
          </button>`).join("")}
        </div>
      </div>
    </div>

    <!-- BODY -->
    <div class="body-pad" style="max-width:640px;margin:0 auto">
      ${state.tab==="flashcard" ? buildFlashcard(list)
      : state.tab==="list"      ? buildList(list)
      : state.tab==="quiz"      ? buildQuiz()
      :                           buildStats()}
    </div>
  </div>`;
}

// ── Flashcard tab ─────────────────────────────────────────────────────────────
function buildFlashcard(list){
  const modes = [{id:"all",label:"All"},{id:"unseen",label:"Not yet learned"},{id:"hard",label:"Hard words"}];
  const modeBar = `<div class="tag-scroll" style="margin-bottom:18px">
    ${modes.map(m=>`<button data-mode="${m.id}" style="padding:6px 14px;border-radius:20px;border:none;white-space:nowrap;
      background:${state.filterMode===m.id?"#4f46e5":"#e0e7ff"};
      color:${state.filterMode===m.id?"#fff":"#4f46e5"};font-weight:600;font-size:13px">${m.label}</button>`).join("")}
  </div>`;

  if(list.length===0) return modeBar+`<div style="text-align:center;color:#71717a;padding:40px">No words in this filter 🎉</div>`;

  const idx  = Math.min(state.cardIdx, list.length-1);
  const word = list[idx];
  const diff = DIFF[word.difficulty];
  const isLearned = state.learnedIds.has(word.id);
  const isWrong   = state.wrongIds.has(word.id);

  return modeBar + `
  <div style="text-align:center;color:#71717a;font-size:13px;margin-bottom:14px">${idx+1} / ${list.length}</div>

  <div class="flip-container">
    <div id="fc" class="flip-card${word._flipped?"flipped":""}">
      <!-- Front -->
      <div class="flip-front">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <span style="background:${diff.bg};color:${diff.text};font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:.06em;text-transform:uppercase">${diff.label}</span>
          <span style="color:#a5b4fc;font-size:11px">${word.chapter}</span>
        </div>
        <div style="text-align:center">
          <div style="color:#c7d2fe;font-size:13px;margin-bottom:6px">${word.part}</div>
          <div style="color:#fff;font-size:clamp(24px,7vw,38px);font-weight:800;letter-spacing:-.02em;line-height:1.15;font-family:Georgia,serif">${word.word}</div>
          <div style="color:#818cf8;font-size:14px;margin-top:8px">${word.phonetic}</div>
        </div>
        <div style="display:flex;justify-content:center;align-items:center;gap:6px;color:#6366f1;font-size:13px">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><polyline points="23 20 23 14 17 14"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
          tap to reveal
        </div>
      </div>
      <!-- Back -->
      <div class="flip-back">
        <div>
          <div style="font-size:11px;font-weight:700;color:#a1a1aa;text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px">Definition</div>
          <div style="font-size:15px;font-weight:600;color:#18181b;line-height:1.5">${word.definition}</div>
        </div>
        <div style="background:#f0f0ff;border-radius:12px;padding:10px 14px">
          <div style="font-size:11px;font-weight:700;color:#6366f1;text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px">한국어</div>
          <div style="font-size:15px;color:#3730a3;font-weight:600">${word.korean}</div>
        </div>
        <div style="background:#fffbeb;border-radius:12px;padding:10px 14px;flex:1">
          <div style="font-size:11px;font-weight:700;color:#d97706;margin-bottom:5px">📖 In the book</div>
          <div style="font-size:13px;color:#78350f;line-height:1.65;font-style:italic">${word.bookContext}</div>
        </div>
        <div style="display:flex;gap:10px">
          <button id="btn-wrong" style="flex:1;padding:10px 0;border-radius:12px;border:none;
            background:${isWrong?"#fecaca":"#fee2e2"};color:#b91c1c;font-weight:700;font-size:14px">
            ✕ Hard
          </button>
          <button id="btn-got" style="flex:1;padding:10px 0;border-radius:12px;border:none;
            background:${isLearned?"#bbf7d0":"#d1fae5"};color:#065f46;font-weight:700;font-size:14px">
            ✓ Got it!
          </button>
        </div>
      </div>
    </div>
  </div>

  <div style="display:flex;justify-content:center;gap:12px;margin-top:20px">
    <button id="btn-prev" style="padding:10px 20px;border-radius:12px;border:1.5px solid #d4d4d8;background:#fff;font-weight:600;color:#3f3f46">← Prev</button>
    <button id="btn-next" style="padding:10px 20px;border-radius:12px;border:none;background:#4f46e5;color:#fff;font-weight:600">Next →</button>
  </div>`;
}

// ── Word List tab ─────────────────────────────────────────────────────────────
function buildList(list){
  const cards = list.map(w=>{
    const exp = state.expandedId===w.id;
    const diff = DIFF[w.difficulty];
    const isLearned = state.learnedIds.has(w.id);
    const isWrong   = state.wrongIds.has(w.id);
    return `
    <div data-expand="${w.id}" style="background:#fff;border-radius:16px;padding:16px 18px;
      box-shadow:0 2px 12px rgba(0,0,0,.06);cursor:pointer;
      border:1.5px solid ${isLearned?"#6ee7b7":isWrong?"#fca5a5":"transparent"}">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            <span style="font-size:17px;font-weight:800;color:#1e1b4b;font-family:Georgia,serif">${w.word}</span>
            <span style="font-size:12px;color:#71717a">${w.part}</span>
            <span style="background:${diff.bg};color:${diff.text};font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;text-transform:uppercase">${diff.label}</span>
          </div>
          <div style="font-size:13px;color:#52525b;margin-top:2px">${w.korean}</div>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <button data-star="${w.id}" style="background:none;border:none;padding:4px;font-size:16px">
            ${isLearned?"⭐":"☆"}
          </button>
          <span style="color:#d4d4d8;font-size:16px">${exp?"▲":"▽"}</span>
        </div>
      </div>
      ${exp?`
      <div style="margin-top:12px;border-top:1px solid #f4f4f5;padding-top:12px;display:flex;flex-direction:column;gap:10px">
        <div><span style="font-size:11px;font-weight:700;color:#a1a1aa;text-transform:uppercase;letter-spacing:.07em">Definition  </span>
          <span style="font-size:14px;color:#27272a;line-height:1.55">${w.definition}</span></div>
        <div style="background:#fffbeb;border-radius:10px;padding:10px 14px">
          <div style="font-size:11px;font-weight:700;color:#d97706;margin-bottom:4px">📖 In the book</div>
          <div style="font-size:13px;color:#92400e;font-style:italic;line-height:1.65">${w.bookContext}</div>
          <div style="font-size:11px;color:#a16207;margin-top:6px">${w.chapter}</div>
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          ${w.tags.map(t=>`<span style="background:#ede9fe;color:#5b21b6;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600">${t}</span>`).join("")}
        </div>
      </div>`:""}
    </div>`;
  }).join("");

  return `
  <div style="position:relative;margin-bottom:12px">
    <svg style="position:absolute;left:13px;top:50%;transform:translateY(-50%);color:#a1a1aa" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#a1a1aa" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="search-input" value="${state.searchQ.replace(/"/g,'&quot;')}" placeholder="Search word or Korean..."
      style="width:100%;padding:11px 14px 11px 36px;border-radius:12px;border:1.5px solid #e4e4e7;font-size:14px;outline:none"/>
  </div>
  <div class="tag-scroll" style="margin-bottom:14px">
    ${ALL_TAGS.map(t=>`<button data-tag="${t}" style="padding:5px 12px;border-radius:20px;border:none;white-space:nowrap;
      background:${state.filterTag===t?"#4f46e5":"#ede9fe"};
      color:${state.filterTag===t?"#fff":"#5b21b6"};font-weight:600;font-size:12px">${t}</button>`).join("")}
  </div>
  <div style="color:#71717a;font-size:13px;margin-bottom:10px">${list.length} words</div>
  <div style="display:flex;flex-direction:column;gap:10px">${cards}</div>`;
}

// ── Quiz tab ──────────────────────────────────────────────────────────────────
function buildQuiz(){
  if(!state.quiz) initQuiz();
  const q = state.quiz;

  if(q.done){
    const total = q.score.correct+q.score.wrong;
    const pct   = Math.round(q.score.correct/total*100);
    return `
    <div style="text-align:center;padding:40px 20px">
      <div style="font-size:64px">${pct>=80?"🎉":pct>=50?"💪":"📚"}</div>
      <div style="font-size:28px;font-weight:800;color:#1e1b4b;margin-top:12px">${pct}%</div>
      <div style="color:#52525b;margin-top:6px">${q.score.correct} correct out of ${total}</div>
      <button id="quiz-reset" style="margin-top:24px;background:#4f46e5;color:#fff;border:none;border-radius:12px;padding:12px 28px;font-weight:700;font-size:15px">
        Try Again
      </button>
    </div>`;
  }

  const current = q.pool[q.idx];
  const progress = Math.round((q.idx/q.pool.length)*100);

  const optBtns = q.options.map(opt=>{
    let bg="#fff",border="1.5px solid #e4e4e7",color="#1e1b4b";
    if(q.selected!==null){
      if(opt.id===current.id){bg="#d1fae5";border="1.5px solid #6ee7b7";color="#065f46";}
      else if(opt.id===q.selected){bg="#fee2e2";border="1.5px solid #fca5a5";color="#991b1b";}
    }
    return `<button class="quiz-opt" data-opt="${opt.id}"
      ${q.selected!==null?"disabled":""}
      style="background:${bg};border:${border};color:${color};border-radius:12px;padding:14px 18px;
      text-align:left;font-weight:700;font-size:15px;font-family:Georgia,serif;width:100%">
      ${opt.word}
    </button>`;
  }).join("");

  return `
  <div style="background:#ede9fe;border-radius:14px;padding:12px 16px;margin-bottom:18px;font-size:14px;color:#5b21b6">
    💡 Choose the word that matches the definition.
  </div>
  <div style="display:flex;justify-content:space-between;margin-bottom:12px;font-size:13px;color:#71717a">
    <span>Question ${q.idx+1} / ${q.pool.length}</span>
    <span>✅ ${q.score.correct}  ❌ ${q.score.wrong}</span>
  </div>
  <div style="height:4px;background:#e4e4e7;border-radius:4px;margin-bottom:20px">
    <div style="height:100%;width:${progress}%;background:#4f46e5;border-radius:4px;transition:width .3s"></div>
  </div>
  <div style="background:linear-gradient(135deg,#1e1b4b,#312e81);border-radius:16px;padding:24px;margin-bottom:18px;text-align:center">
    <div style="font-size:12px;color:#a5b4fc;margin-bottom:8px;font-weight:600">Which word matches this definition?</div>
    <div style="font-size:15px;color:#e0e7ff;line-height:1.6">${current.definition}</div>
    <div style="margin-top:8px;font-size:13px;color:#818cf8">${current.korean}</div>
  </div>
  <div style="display:flex;flex-direction:column;gap:10px">${optBtns}</div>`;
}

// ── Stats tab ─────────────────────────────────────────────────────────────────
function buildStats(){
  const cats = ["Core Concept","Bias","Fallacy","Heuristic","Prospect Theory"];
  const catBars = cats.map(tag=>{
    const total = VOCAB.filter(w=>w.tags.includes(tag)).length;
    const done  = VOCAB.filter(w=>w.tags.includes(tag)&&state.learnedIds.has(w.id)).length;
    const pct   = total ? Math.round(done/total*100) : 0;
    return `
    <div style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px">
        <span style="font-weight:600;color:#27272a">${tag}</span>
        <span style="color:#71717a">${done}/${total}</span>
      </div>
      <div style="height:8px;background:#f4f4f5;border-radius:4px">
        <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,#6366f1,#818cf8);border-radius:4px;transition:width .4s"></div>
      </div>
    </div>`;
  }).join("");

  const cards = [
    {label:"Total Words",  val:VOCAB.length,                                          color:"#4f46e5",emoji:"📚"},
    {label:"Mastered ⭐",  val:state.learnedIds.size,                                 color:"#059669",emoji:"✅"},
    {label:"Need Practice",val:state.wrongIds.size,                                   color:"#dc2626",emoji:"🔁"},
    {label:"Not Started",  val:VOCAB.length-state.learnedIds.size-state.wrongIds.size,color:"#d97706",emoji:"📖"},
  ].map(s=>`
    <div style="background:#fff;border-radius:16px;padding:18px 16px;box-shadow:0 2px 12px rgba(0,0,0,.06)">
      <div style="font-size:24px">${s.emoji}</div>
      <div style="font-size:26px;font-weight:800;color:${s.color};margin-top:4px">${s.val}</div>
      <div style="font-size:13px;color:#71717a;margin-top:2px">${s.label}</div>
    </div>`).join("");

  return `
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px">${cards}</div>
  <div style="background:#fff;border-radius:16px;padding:18px;box-shadow:0 2px 12px rgba(0,0,0,.06);margin-bottom:14px">
    <div style="font-weight:700;color:#1e1b4b;margin-bottom:14px">Progress by Category</div>
    ${catBars}
  </div>
  <button id="btn-reset-all" style="width:100%;padding:14px;border-radius:12px;border:1.5px solid #fca5a5;background:#fff;color:#dc2626;font-weight:700;font-size:14px">
    Reset All Progress
  </button>`;
}

// ─── EVENTS ──────────────────────────────────────────────────────────────────
function attachEvents(){
  // Tab switch
  document.querySelectorAll("[data-tab]").forEach(btn=>{
    btn.addEventListener("click",()=>{
      state.tab = btn.dataset.tab;
      state.cardIdx = 0;
      if(state.tab==="quiz") state.quiz = null;
      render();
    });
  });

  // Flashcard flip
  const fc = document.getElementById("fc");
  if(fc){
    fc.addEventListener("click", e=>{
      if(e.target.closest("#btn-wrong")||e.target.closest("#btn-got")) return;
      fc.classList.toggle("flipped");
    });
  }

  // Flashcard mark
  const list = filtered();
  const idx  = Math.min(state.cardIdx, list.length-1);
  const btnWrong = document.getElementById("btn-wrong");
  const btnGot   = document.getElementById("btn-got");
  if(btnWrong) btnWrong.addEventListener("click", e=>{ e.stopPropagation(); markCard("wrong", list, idx); });
  if(btnGot)   btnGot.addEventListener("click",   e=>{ e.stopPropagation(); markCard("learned", list, idx); });

  // Flashcard prev/next
  document.getElementById("btn-prev")?.addEventListener("click",()=>{ state.cardIdx=Math.max(0,state.cardIdx-1); render(); });
  document.getElementById("btn-next")?.addEventListener("click",()=>{ state.cardIdx=Math.min(list.length-1,state.cardIdx+1); render(); });

  // Filter mode (flashcard)
  document.querySelectorAll("[data-mode]").forEach(btn=>{
    btn.addEventListener("click",()=>{ state.filterMode=btn.dataset.mode; state.cardIdx=0; render(); });
  });

  // List: search
  const si = document.getElementById("search-input");
  if(si) si.addEventListener("input", e=>{ state.searchQ=e.target.value; render(); });

  // List: tag filter
  document.querySelectorAll("[data-tag]").forEach(btn=>{
    btn.addEventListener("click",()=>{ state.filterTag=btn.dataset.tag; render(); });
  });

  // List: expand
  document.querySelectorAll("[data-expand]").forEach(el=>{
    el.addEventListener("click", e=>{
      if(e.target.closest("[data-star]")) return;
      const id = +el.dataset.expand;
      state.expandedId = state.expandedId===id ? null : id;
      render();
    });
  });

  // List: star
  document.querySelectorAll("[data-star]").forEach(btn=>{
    btn.addEventListener("click", e=>{ e.stopPropagation();
      const id = +btn.dataset.star;
      if(state.learnedIds.has(id)) state.learnedIds.delete(id);
      else state.learnedIds.add(id);
      save(); render();
    });
  });

  // Quiz options
  document.querySelectorAll(".quiz-opt").forEach(btn=>{
    btn.addEventListener("click",()=>{
      const q = state.quiz;
      if(q.selected!==null||q.done) return;
      const optId  = +btn.dataset.opt;
      const current = q.pool[q.idx];
      q.selected = optId;
      if(optId===current.id) q.score.correct++; else q.score.wrong++;
      render();
      setTimeout(()=>{
        if(q.idx+1>=q.pool.length){ q.done=true; }
        else {
          q.idx++;
          q.selected=null;
          q.options=makeOptions(q.pool[q.idx]);
        }
        render();
      },1100);
    });
  });

  // Quiz reset
  document.getElementById("quiz-reset")?.addEventListener("click",()=>{ initQuiz(); render(); });

  // Stats reset
  document.getElementById("btn-reset-all")?.addEventListener("click",()=>{
    if(confirm("Reset all progress?")){ state.learnedIds=new Set(); state.wrongIds=new Set(); save(); render(); }
  });
}

function markCard(type, list, idx){
  const word = list[idx];
  if(!word) return;
  if(type==="learned"){ state.learnedIds.add(word.id); state.wrongIds.delete(word.id); }
  else { state.wrongIds.add(word.id); state.learnedIds.delete(word.id); }
  save();
  if(idx+1 < list.length) state.cardIdx++;
  render();
}

// ─── SERVICE WORKER (inline, for PWA offline) ─────────────────────────────────
const SW_CODE = `
self.addEventListener('install',e=>{ self.skipWaiting(); });
self.addEventListener('activate',e=>{ e.waitUntil(clients.claim()); });
self.addEventListener('fetch',e=>{
  e.respondWith(
    caches.open('tfs-v1').then(cache=>
      cache.match(e.request).then(cached=>{
        const fresh = fetch(e.request).then(r=>{ cache.put(e.request,r.clone()); return r; }).catch(()=>cached);
        return cached || fresh;
      })
    )
  );
});`;

if('serviceWorker' in navigator){
  const blob = new Blob([SW_CODE],{type:'application/javascript'});
  const swURL = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swURL).catch(()=>{});
}

// ─── BOOT ─────────────────────────────────────────────────────────────────────
render();
</script>
